<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chapter 06</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .image-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
        }
        .image-container img {
            aspect-ratio: auto; /* Adjust to your desired aspect ratio */
            max-width: 100%;
            display: block;
            flex: 0 0 auto;
        }

    /* Chapter navigation (prev / next) */
    .chapter-nav {
      display: flex;
      gap: 12px;
      margin: 0px auto 60px;
      max-width: 480px;
    }

    .nav-button {
      flex: 1;
      padding: 18px 0;

      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700; /* Bold */

      background-color: #50528d;
      color: white;
      border-radius: 6px;

      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s ease;
    }

    .nav-button:hover {
      opacity: 0.85;
    }

    /* Less bright Previous button */
    .nav-button.previous {
      background-color: #3e406f; /* Slightly darker / softer */
      opacity: 0.85;
    }

    .nav-button.previous:hover {
      opacity: 0.75;
    }
  </style>
</head>

<body>

  <div class="comic">
    <div id="chapter06-container"></div>
    
    <script>
      const container = document.getElementById('chapter06-container');
      const totalImages = 55;
    
      for (let i = 1; i <= totalImages; i++) {
        // Pad the number to 3 digits, e.g., 001, 002
        const num = String(i).padStart(3, '0');
    
        // Create a div element
        const panel = document.createElement('div');
        panel.className = 'panel';
        panel.style.backgroundImage = `url('Chapter 06/Chapter 06_${num}.jpg')`;
    
        // Append it to the container
        container.appendChild(panel);
      }
    </script>
    
    <!-- PREVIOUS / NEXT NAVIGATION -->
    <div class="chapter-nav">
      <a href="chapter05.html" class="nav-button previous">
        ← Previous
      </a>

      <a href="lastchapter.html" class="nav-button">
        Next →
      </a>
    </div>
  </div>

  <script>
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>

  <!-- AGE POPUP SCRIPT -->
  <script src="age-gate.js"></script>
  
</body>
</html>
