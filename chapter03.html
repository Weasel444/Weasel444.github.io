  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: white;

      font-family: 'Lato', sans-serif;
      font-weight: 400;

      /* Disable zoom gestures, allow vertical scroll */
      touch-action: pan-y;

      /* Disable selection & long-press */
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .comic {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    /* Each panel is one image */
    .panel {
      width: 100%;
      aspect-ratio: 1 / 1;

      background-size: contain;
      background-position: center top;
      background-repeat: no-repeat;
      background-color: black;
    }

    /* Chapter navigation (prev / next) */
    .chapter-nav {
      display: flex;
      gap: 12px;
      margin: 0px auto 60px;
      max-width: 480px;
    }

    .nav-button {
      flex: 1;
      padding: 18px 0;

      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700; /* Bold */

      background-color: #50528d;
      color: white;
      border-radius: 6px;

      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s ease;
    }

    .nav-button:hover {
      opacity: 0.85;
    }

    /* Less bright Previous button */
    .nav-button.previous {
      background-color: #3e406f; /* Slightly darker / softer */
      opacity: 0.85;
    }

    .nav-button.previous:hover {
      opacity: 0.75;
    }
  </style>
</head>

  <script>
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>

  <!-- AGE POPUP SCRIPT -->
  <script src="age-gate.js"></script>

  <!-- SCRIPT TO ADJUST PANEL HEIGHTS -->
  <script>
    document.querySelectorAll('.panel').forEach(panel => {
      const img = new Image();
      img.src = panel.style.backgroundImage.slice(5, -2); // remove url("…")
      img.onload = () => {
        const ratio = img.height / img.width;
        panel.style.height = `${panel.offsetWidth * ratio}px`;
      };
    });
  </script>
