  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: white;

      font-family: 'Lato', sans-serif;
      font-weight: 400;

      /* Disable zoom gestures, allow vertical scroll */
      touch-action: pan-y;

      /* Disable selection & long-press */
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .comic {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    /* Each panel is one image */
    .panel {
      width: 100%;
      aspect-ratio: 1 / 1;

      background-size: contain;
      background-position: center top;
      background-repeat: no-repeat;
      //background-color: black;
    }

    /* NEXT CHAPTER BUTTON */
    .next-chapter {
      display: inline-block;
      margin: 0px auto 60px;
      padding: 18px 28px;

      text-align: center;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;

      background-color: #50528d;
      color: white;
      border-radius: 6px;

      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s ease;
    }

    .next-chapter:hover {
      opacity: 0.85;
    }
  </style>
</head>

  <script>
    // Disable right-click / long-press menu
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
    });

    // Disable double-tap zoom (iOS Safari)
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
