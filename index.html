<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- LOCK ZOOM -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Chapter 01</title>

  <!-- GOOGLE FONT: LATO REGULAR + BOLD -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">

  <!-- AGE POPUP STYLES -->
  <link rel="stylesheet" href="age-pop-up-style.css?v=9">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: white;

      font-family: 'Lato', sans-serif;
      font-weight: 400;

      /* Disable zoom gestures, allow vertical scroll */
      touch-action: pan-y;

      /* Disable selection & long-press */
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .comic {
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    .panel {
      width: 100%;
      background-color: black;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center top;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .panel.loaded {
      opacity: 1;
    }

    /* Chapter navigation */
    .chapter-nav {
      display: flex;
      gap: 12px;
      margin: 20px auto 60px;
      max-width: 480px;
    }

    .nav-button {
      flex: 1;
      padding: 18px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      background: #50528d;
      color: white;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s ease;
    }

    .nav-button:hover {
      opacity: 0.85;
    }

    /* Center single button */
    .chapter-nav.single {
      justify-content: center;
    }

    .chapter-nav.single .nav-button {
      flex: 0 0 60%;
    }
  </style>
</head>

<body>

  <div class="comic">
    <div id="chapter-container"></div>
  </div>

  <script src="data/chapters.js"></script>
  <script src="js/comic.js"></script>

  <!-- AGE POPUP SCRIPT -->
  <script src="age-gate.js"></script>
</body>
</html>
